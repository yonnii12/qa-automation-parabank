name: QA Automation Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright Browsers
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

    - name: Install Newman & Reporter
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run Java UI & API Tests (Maven)
      run: mvn test
      continue-on-error: true # Para que ejecute Postman aunque fallen los de Java

    - name: Run Postman API Tests (Newman)
      run: |
        mkdir -p target/newman
        newman run api-postman/ParaBank_API.postman_collection.json \
          -e api-postman/QA_Environment.postman_environment.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export target/newman/api-report.html
      continue-on-error: true

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always() # Siempre subir reportes, falle o pase
      with:
        name: test-reports
        path: |
          target/cucumber-report.html
          target/cucumber.json
          target/newman/api-report.html
          target/videos/
        retention-days: 5
